name: Build and Publish

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - shell: bash
        run: |
          set +e
          uv run pytest
          rc=$?
          set -e
          [[ "$rc" -eq 0 || "$rc" -eq 5 ]]

  publish:
    runs-on: ubuntu-latest
    needs: test
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - run: uv build
      - name: Check if version exists on PyPI
        id: exists
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re
          import urllib.request

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"', pyproject, re.MULTILINE)
          if not m:
              raise SystemExit("Could not read version from pyproject.toml")
          version = m.group(1)

          with urllib.request.urlopen("https://pypi.org/pypi/facebook-ads-reports/json", timeout=15) as r:
              data = json.load(r)
          exists = version in data.get("releases", {})

          with open("$GITHUB_OUTPUT", "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"exists={'true' if exists else 'false'}\n")
          PY

      - name: Publish to PyPI
        if: steps.exists.outputs.exists != 'true'
        run: uv publish --check-url https://pypi.org/simple/
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Skip publish
        if: steps.exists.outputs.exists == 'true'
        run: echo "Version ${{ steps.exists.outputs.version }} already exists on PyPI; skipping publish."
